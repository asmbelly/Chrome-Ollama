<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ollama Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f0d;
      --bg2:       #111411;
      --border:    #1e2a1e;
      --green:     #39ff6a;
      --green-dim: #1a6630;
      --amber:     #f5a623;
      --red:       #ff4444;
      --muted:     #3a4a3a;
      --text:      #c8e6c8;
      --text-dim:  #557755;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; overflow: hidden; }

    #app { display: flex; flex-direction: column; height: 100vh; }

    #titlebar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .dots-row { display: flex; gap: 6px; align-items: center; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.r { background: #ff5f57; } .dot.y { background: #febc2e; } .dot.g { background: #28c840; }
    .title { color: var(--green); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; margin-left: 8px; }
    #model-badge {
      font-size: 10px; color: var(--amber); background: rgba(245,166,35,0.1);
      border: 1px solid rgba(245,166,35,0.3); padding: 2px 8px; border-radius: 2px; cursor: pointer;
    }
    #model-badge:hover { background: rgba(245,166,35,0.2); }

    #output {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 2px; scroll-behavior: smooth;
    }
    #output::-webkit-scrollbar { width: 4px; }
    #output::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 2px; }

    .line { line-height: 1.6; white-space: pre-wrap; word-break: break-word; animation: fi 0.1s ease; }
    @keyframes fi { from { opacity:0 } to { opacity:1 } }
    .line.system { color: var(--text-dim); }
    .line.user   { color: var(--green); }
    .line.ai     { color: var(--text); }
    .line.error  { color: var(--red); }
    .line.info   { color: var(--amber); }
    .line.blank  { height: 6px; }

    .thinking { display: flex; align-items: center; gap: 6px; color: var(--text-dim); }
    .thinking span { animation: blink 1.2s infinite; opacity: 0; }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,100%{opacity:0} 50%{opacity:1} }

    #palette {
      display: none; position: absolute; bottom: 48px; left: 0; right: 0;
      background: var(--bg2); border-top: 1px solid var(--border); z-index: 10; max-height: 220px; overflow-y: auto;
    }
    #palette.open { display: block; }
    .pal-header { padding: 6px 12px; font-size: 10px; color: var(--text-dim); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.1em; }
    .pal-item { display: flex; align-items: center; gap: 12px; padding: 8px 12px; cursor: pointer; transition: background 0.1s; }
    .pal-item:hover, .pal-item.sel { background: rgba(57,255,106,0.06); }
    .pal-item .pname { color: var(--green); min-width: 110px; }
    .pal-item .pdesc { color: var(--text-dim); }
    .pal-item .pname.amber { color: var(--amber); }
    .pal-item.active .pname::after { content: ' ●'; color: var(--green); }

    #inputbar {
      display: flex; align-items: center; padding: 8px 12px;
      border-top: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; gap: 6px;
    }
    #pfx { color: var(--green-dim); flex-shrink: 0; user-select: none; }
    #inp {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--green); font-family: 'JetBrains Mono', monospace; font-size: 12px; caret-color: var(--green);
    }
    #inp::placeholder { color: var(--muted); }
    #sbtn {
      background: transparent; border: 1px solid var(--green-dim); color: var(--green-dim);
      font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 3px 8px;
      cursor: pointer; border-radius: 2px; transition: all 0.15s;
    }
    #sbtn:hover { border-color: var(--green); color: var(--green); }

    #app::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 100;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
    }
  </style>
</head>
<body>
<div id="app">
  <div id="titlebar">
    <div class="dots-row">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      <span class="title">OLLAMA // TERMINAL</span>
    </div>
    <div id="model-badge">▸ loading...</div>
  </div>
  <div id="output"></div>
  <div id="palette"></div>
  <div id="inputbar">
    <span id="pfx">❯</span>
    <input id="inp" type="text" placeholder="message or / for commands" autocomplete="off" spellcheck="false" />
    <button id="sbtn">SEND</button>
  </div>
</div>
<script src="sidebar.js"></script>
</body>
</html>
